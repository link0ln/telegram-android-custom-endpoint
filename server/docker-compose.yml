services:
  mtrelay:
    build: .
    image: mtrelay:latest
    container_name: mtrelay
    restart: unless-stopped

    # Publish the relay on public 443. The custom client connects here over real TLS.
    ports:
      - "443:443"

    # If THIS host is itself blocked from reaching Telegram (e.g. some RU VPS),
    # comment out `ports:` above and use host networking so the relay follows the
    # host's routing table / VPN routes to the Telegram DC ranges instead:
    #   network_mode: host
    #   (then set RELAY_LISTEN_PORT below to 443)

    environment:
      RELAY_LISTEN_HOST: "0.0.0.0"
      RELAY_LISTEN_PORT: "443"
      RELAY_CERT: "/certs/fullchain.pem"
      RELAY_KEY: "/certs/privkey.pem"
      # Optional cover site for non-proxy traffic (browsers / DPI active probes).
      # Point it at a real site you host so the endpoint looks like normal HTTPS.
      # MASK_HOST: "127.0.0.1"
      # MASK_PORT: "80"

    volumes:
      # Put a valid TLS certificate for YOUR domain here (fullchain.pem + privkey.pem).
      # e.g. symlink your Let's Encrypt live/<domain>/ directory, or copy the files.
      - ./certs:/certs:ro
