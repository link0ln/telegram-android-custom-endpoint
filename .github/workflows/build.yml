name: build-apk

on:
  workflow_dispatch:
    inputs:
      all_abis:
        description: "Build all ABIs (universal APK) instead of arm64-only"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # DrKLO/Telegram commit the client patch was made against
  TG_COMMIT: 9b50143d8896d255d03155598937e4f3e28afd86

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Clone DrKLO/Telegram @ pinned commit
        run: |
          git init Telegram
          cd Telegram
          git remote add origin https://github.com/DrKLO/Telegram.git
          git -c protocol.version=2 fetch --depth 1 origin "$TG_COMMIT"
          git checkout --detach FETCH_HEAD

      - name: Apply custom-endpoint patch
        run: bash custom/client/apply.sh "$PWD/Telegram"

      - name: Limit to arm64-v8a (faster)
        if: ${{ !inputs.all_abis }}
        run: |
          sed -i 's/"armeabi-v7a", "arm64-v8a", "x86", "x86_64"/"arm64-v8a"/g' \
            Telegram/TMessagesProj_App/build.gradle

      - name: Configure SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > Telegram/local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('Telegram/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build APK
        run: |
          cd Telegram
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleAfatDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          cp Telegram/TMessagesProj_App/build/outputs/apk/afat/debug/app.apk tg-custom-endpoint.apk
          sha256sum tg-custom-endpoint.apk | tee tg-custom-endpoint.apk.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-custom-endpoint-apk
          path: |
            tg-custom-endpoint.apk
            tg-custom-endpoint.apk.sha256

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tg-custom-endpoint.apk
            tg-custom-endpoint.apk.sha256
          body: |
            Custom-endpoint Telegram for Android — automated build.

            Debug-signed; installs alongside the official app as
            `org.telegram.messenger.beta`. On first launch enter your
            `api_id`, `api_hash` (https://my.telegram.org) and your relay
            endpoint host. Built from DrKLO/Telegram @ ${{ env.TG_COMMIT }}.
