name: upstream-watch

# Track DrKLO/Telegram *master* and build from it — NOT from GitHub releases/tags,
# which are stale (last one: 11.4.2, Nov 2024). DrKLO pushes squashed per-release
# commits straight to master ("update to X.Y.Z (build)"), so master HEAD is the
# latest version. This job polls master HEAD by commit sha; when it moves past the
# commit we pin, it dry-runs the patch, opens a tracking issue, and (if the patch
# still applies) builds an APK artifact from that master commit.

on:
  schedule:
    - cron: "0 6 * * *"        # daily, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.scan.outputs.new }}
      ref: ${{ steps.scan.outputs.ref }}
      short: ${{ steps.scan.outputs.short }}
      version: ${{ steps.scan.outputs.version }}
      dupe: ${{ steps.dedupe.outputs.dupe }}
      applies: ${{ steps.check.outputs.applies }}
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Check master HEAD
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PIN_SHA=$(grep -oE 'TG_COMMIT: [0-9a-f]+' custom/.github/workflows/build.yml | awk '{print $2}')
          gh api "repos/DrKLO/Telegram/commits/master" > head.json
          HEAD_SHA=$(jq -r '.sha' head.json)
          HEAD_MSG=$(jq -r '.commit.message' head.json | head -1)
          VER=$(printf '%s' "$HEAD_MSG" | grep -oE 'update to [0-9.]+' | awk '{print $3}' || true)
          [ -n "$VER" ] || VER="master"
          echo "pinned : ${PIN_SHA:0:10}"
          echo "master : ${HEAD_SHA:0:10}  ($HEAD_MSG)"

          echo "ref=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "short=${HEAD_SHA:0:10}" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if [ "$HEAD_SHA" != "$PIN_SHA" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "==> master moved past pinned commit"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "==> up to date (pinned == master HEAD)"
          fi

      - name: Skip if already tracked
        id: dedupe
        if: steps.scan.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MARK="upstream-${{ steps.scan.outputs.short }}"
          CNT=$(gh issue list --repo "${{ github.repository }}" --state all \
                  --search "$MARK in:title" --json number --jq 'length')
          echo "existing issues for $MARK: $CNT"
          if [ "$CNT" -gt 0 ]; then echo "dupe=true" >> "$GITHUB_OUTPUT"; else echo "dupe=false" >> "$GITHUB_OUTPUT"; fi

      - name: Dry-run patch against master HEAD
        id: check
        if: steps.scan.outputs.new == 'true' && steps.dedupe.outputs.dupe == 'false'
        run: |
          set -euo pipefail
          git init Telegram >/dev/null
          cd Telegram
          git remote add origin https://github.com/DrKLO/Telegram.git
          git -c protocol.version=2 fetch --depth 1 origin "${{ steps.scan.outputs.ref }}"
          git checkout --detach FETCH_HEAD >/dev/null
          cd ..
          if bash custom/client/apply.sh --check "$PWD/Telegram" 2> reject.txt; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
            echo "patch applies cleanly"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
            echo "---- patch does NOT apply ----"; cat reject.txt || true
          fi

      - name: Open tracking issue
        if: steps.scan.outputs.new == 'true' && steps.dedupe.outputs.dupe == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${{ steps.scan.outputs.version }}"
          SHORT="${{ steps.scan.outputs.short }}"
          REF="${{ steps.scan.outputs.ref }}"
          RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "DrKLO/Telegram **master** is now at \`$REF\` (**$V**)."
            echo
            if [ "${{ steps.check.outputs.applies }}" = "true" ]; then
              echo "The custom-endpoint patch **applies cleanly**. An arm64 APK is being"
              echo "built from this master commit in this run — grab it from **Artifacts**:"
              echo
              echo "$RUN"
              echo
              echo "Test it, then to make it the default: bump \`TG_COMMIT\` to \`$REF\`"
              echo "in \`.github/workflows/build.yml\` and push a \`v*\` tag to cut a release."
            else
              echo "The custom-endpoint patch **does NOT apply** to current master — it"
              echo "needs rebasing. \`git apply\` output:"
              echo
              echo '```'
              head -60 reject.txt 2>/dev/null || echo "(no output captured)"
              echo '```'
              echo
              echo "Rebase \`client/patches/custom-endpoint.patch\` onto \`$REF\`, bump"
              echo "\`TG_COMMIT\`, then push a \`v*\` tag."
            fi
          } > issue-body.md
          if [ "${{ steps.check.outputs.applies }}" = "true" ]; then STATE="OK, building"; else STATE="NEEDS REBASE"; fi
          gh issue create --repo "${{ github.repository }}" \
            --title "Upstream $V ($SHORT) — patch $STATE [upstream-$SHORT]" \
            --body-file issue-body.md

  build:
    needs: detect
    if: needs.detect.outputs.new == 'true' && needs.detect.outputs.dupe == 'false' && needs.detect.outputs.applies == 'true'
    permissions:
      contents: write   # reusable build.yml declares contents: write (for its release step); caller must grant >=
    uses: ./.github/workflows/build.yml
    with:
      tg_ref: ${{ needs.detect.outputs.ref }}
      all_abis: false
      do_release: false
